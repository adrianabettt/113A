<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>O Mundo dos Símbolos</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
  }

  body {
    font-family: 'Fredoka', 'Arial Rounded MT Bold', sans-serif;
    background: linear-gradient(160deg, #C9EEFF 0%, #E8F9E0 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    height: 100vh;
    padding: 10px 16px 8px;
    gap: 6px;
  }

  /* ── Header ── */
  .header { text-align: center; flex-shrink: 0; }
  .header h1 {
    font-size: clamp(1.1rem, 3vw, 1.7rem);
    font-weight: 700;
    color: #1A6FA8;
    text-shadow: 0 2px 0 rgba(255,255,255,0.7);
    line-height: 1.1;
  }
  .header p {
    font-size: clamp(0.75rem, 1.8vw, 0.95rem);
    color: #3A7D44;
    font-weight: 600;
  }

  /* ── Stars ── */
  .stars {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-shrink: 0;
  }
  .star {
    font-size: clamp(1.2rem, 3vw, 1.7rem);
    transition: transform 0.4s cubic-bezier(.34,1.56,.64,1);
    filter: grayscale(1) opacity(0.35);
    line-height: 1;
  }
  .star.earned {
    filter: none;
    transform: scale(1.35) rotate(-10deg);
  }

  /* ── Instruction ── */
  .instruction {
    background: white;
    border-radius: 12px;
    padding: 6px 18px;
    font-size: clamp(0.72rem, 1.8vw, 0.9rem);
    color: #1A6FA8;
    font-weight: 600;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    text-align: center;
    flex-shrink: 0;
    white-space: nowrap;
  }
  .instruction span { color: #FF6B6B; }

  /* ── SVG connector canvas (absolute, behind overlay) ── */
  #connector-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 10;
  }

  /* ── Game area ── */
  .game-area {
    display: flex;
    gap: 12px;
    align-items: stretch;
    justify-content: center;
    width: 100%;
    max-width: 860px;
    flex: 1;
    min-height: 0;
  }

  .column {
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex: 1;
    min-width: 0;
    justify-content: space-around;
  }

  /* ── Cards ── */
  .card {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 4px 0 rgba(0,0,0,0.10), 0 2px 10px rgba(0,0,0,0.06);
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    border: 3px solid transparent;
    user-select: none;
    position: relative;
    outline: none;
    flex: 1;
    min-height: 0;
  }
  .card:hover:not(.matched):not(.disabled) {
    transform: translateY(-3px) scale(1.02);
    box-shadow: 0 8px 0 rgba(0,0,0,0.10), 0 3px 14px rgba(0,0,0,0.09);
  }
  .card:focus-visible { outline: 3px dashed #1A6FA8; outline-offset: 3px; }

  /* Symbol cards */
  .symbol-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    padding: 8px 6px;
    border-color: #D0E8FF;
  }
  .symbol-card .emoji {
    font-size: clamp(2rem, 6vw, 3.4rem);
    line-height: 1;
  }
  .symbol-card .lbl {
    font-size: clamp(0.62rem, 1.6vw, 0.8rem);
    color: #999;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  /* Message cards */
  .message-card {
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 8px 12px;
    border-color: #D4F0D4;
  }
  .message-card .txt {
    font-size: clamp(0.78rem, 2.2vw, 1rem);
    font-weight: 700;
    color: #2D2D2D;
    text-transform: uppercase;
    line-height: 1.25;
  }

  /* States */
  .card.selected {
    border-color: #5BC8F5;
    background: #EEF8FF;
    transform: scale(1.04);
    box-shadow: 0 0 0 4px rgba(91,200,245,0.3), 0 4px 0 rgba(0,0,0,0.10);
  }
  .card.matched {
    border-color: #6BCB77;
    background: linear-gradient(135deg, #F0FFF4, #DCFFE4);
    cursor: default;
  }
  .card.wrong {
    animation: shake 0.42s ease;
    border-color: #FF6B6B;
    background: #FFF0F0;
  }
  .card.disabled { cursor: default; pointer-events: none; }

  .checkmark {
    position: absolute;
    top: -9px; right: -9px;
    background: #6BCB77;
    color: white;
    width: 24px; height: 24px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.85rem;
    box-shadow: 0 2px 5px rgba(0,0,0,0.18);
    opacity: 0;
    transform: scale(0);
    transition: opacity 0.3s, transform 0.35s cubic-bezier(.34,1.56,.64,1);
  }
  .card.matched .checkmark { opacity: 1; transform: scale(1); }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%     { transform: translateX(-7px); }
    40%     { transform: translateX(7px); }
    60%     { transform: translateX(-5px); }
    80%     { transform: translateX(5px); }
  }

  /* ── SVG line ── */
  .connector-line {
    stroke: #3DB86E;
    stroke-width: 4;
    stroke-linecap: round;
    stroke-dasharray: 600;
    stroke-dashoffset: 600;
    fill: none;
    filter: drop-shadow(0 2px 3px rgba(61,184,110,0.35));
    animation: draw-line 0.42s ease forwards;
  }
  @keyframes draw-line { to { stroke-dashoffset: 0; } }

  /* ── Divider ── */
  .divider {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    flex-shrink: 0;
    width: 28px;
  }
  .divider-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #B0C8D8;
  }

  /* ── Celebration overlay ── */
  .celebration {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.48);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .celebration.show { display: flex; }

  .celebration-box {
    background: white;
    border-radius: 28px;
    padding: 28px 36px 24px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.28);
    animation: pop-in 0.45s cubic-bezier(.34,1.56,.64,1);
    max-width: 380px;
    width: 90%;
  }
  @keyframes pop-in {
    from { transform: scale(0.5); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }

  .celeb-emoji { font-size: 3rem; margin-bottom: 6px; }
  .celeb-title {
    font-size: 1.8rem; font-weight: 700; color: #1A6FA8; margin-bottom: 6px;
  }

  /* Score display */
  .score-area {
    margin: 10px 0 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .score-circle {
    width: 80px; height: 80px;
    border-radius: 50%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    font-weight: 700;
    box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    transition: background 0.3s;
  }
  .score-number { font-size: 2rem; line-height: 1; }
  .score-label-sm { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.08em; }
  .score-msg { font-size: 0.95rem; color: #555; font-weight: 600; }
  .score-detail { font-size: 0.8rem; color: #888; }

  .btn-restart {
    background: linear-gradient(135deg, #5BC8F5, #1A6FA8);
    color: white;
    border: none;
    border-radius: 50px;
    padding: 11px 32px;
    font-family: 'Fredoka', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 0 rgba(0,0,0,0.14);
    transition: transform 0.12s, box-shadow 0.12s;
  }
  .btn-restart:hover { transform: translateY(-2px); box-shadow: 0 6px 0 rgba(0,0,0,0.14); }
  .btn-restart:active { transform: translateY(1px); box-shadow: 0 2px 0 rgba(0,0,0,0.14); }

  /* ── Confetti ── */
  .confetti-piece {
    position: fixed;
    width: 11px; height: 11px;
    border-radius: 2px;
    pointer-events: none;
    z-index: 200;
    animation: confetti-fall 1.8s ease-in forwards;
  }
  @keyframes confetti-fall {
    0%   { transform: translateY(-10px) rotate(0deg);    opacity: 1; }
    100% { transform: translateY(100vh) rotate(680deg);  opacity: 0; }
  }
</style>
</head>
<body>

<svg id="connector-canvas"></svg>

<div class="header">
  <h1>🌟 O Mundo dos Símbolos</h1>
  <p>Combine o símbolo com o seu significado!</p>
</div>

<div class="stars" id="stars-row">
  <span class="star" id="star-0">⭐</span>
  <span class="star" id="star-1">⭐</span>
  <span class="star" id="star-2">⭐</span>
  <span class="star" id="star-3">⭐</span>
</div>

<div class="instruction">
  👆 Clique em um <span>SÍMBOLO</span> e depois no seu <span>SIGNIFICADO</span>
</div>

<div class="game-area" id="game-area">
  <div class="column" id="col-symbols"></div>
  <div class="divider">
    <div class="divider-dot"></div>
    <div class="divider-dot"></div>
    <div class="divider-dot"></div>
    <div class="divider-dot"></div>
    <div class="divider-dot"></div>
  </div>
  <div class="column" id="col-messages"></div>
</div>

<!-- Celebration / Score modal -->
<div class="celebration" id="celebration">
  <div class="celebration-box">
    <div class="celeb-emoji" id="celeb-emoji">🎉</div>
    <div class="celeb-title" id="celeb-title">MUITO BEM!</div>
    <div class="score-area">
      <div class="score-circle" id="score-circle">
        <span class="score-number" id="score-number">10</span>
        <span class="score-label-sm">NOTA</span>
      </div>
      <div class="score-msg" id="score-msg">Perfeito! Você é incrível!</div>
      <div class="score-detail" id="score-detail">4 acertos · 0 erros</div>
    </div>
    <button class="btn-restart" onclick="restart()">🔄 JOGAR DE NOVO</button>
  </div>
</div>

<script>
const PAIRS = [
  { id:'',     symbol:'🚳', lbl:'',    message:'PLACA',       color:'#FFE0E0', border:'#FF6B6B' },
  { id:'',    symbol:'😊', lbl:'Emoji',    message:'FELIZ',          color:'#FFF8D6', border:'#FFD93D' },
  { id:'',     symbol:'📶', lbl:'Sinal',    message:'INTERNET',     color:'#E0F0FF', border:'#5BC8F5' },
  { id:'', symbol:'🚻', lbl:'Banheiro', message:'BANHEIRO', color:'#E0FFE8', border:'#6BCB77' },
];

// ── Score config ─────────────────────────────────────────────────────────────
// Each pair: base 2.5 pts. Each wrong attempt on a pair: -0.5 pts (min 0 per pair)
const BASE_PER_PAIR = 10 / PAIRS.length; // 2.5
const PENALTY       = 0.5;

let selectedSymbol = null;
let matched        = 0;
let totalErrors    = 0;
let errorsPerPair  = {}; // id -> count of wrong attempts
let shuffledMsgs   = [];
let audioCtx       = null;

// ── Audio ────────────────────────────────────────────────────────────────────
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playSuccess() {
  try {
    const ctx = getAudio();
    [523,659,784,1047].forEach((f,i) => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = f; o.type = 'sine';
      const t = ctx.currentTime + i*0.11;
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(0.17,t+0.04);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.32);
      o.start(t); o.stop(t+0.32);
    });
  } catch(e){}
}
function playError() {
  try {
    const ctx = getAudio();
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value = 200; o.type = 'sawtooth';
    g.gain.setValueAtTime(0.12, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.28);
    o.start(ctx.currentTime); o.stop(ctx.currentTime+0.28);
  } catch(e){}
}
function playFinish() {
  try {
    const ctx = getAudio();
    [523,659,784,880,1047,1319].forEach((f,i) => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = f; o.type = 'sine';
      const t = ctx.currentTime + i*0.13;
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(0.15,t+0.04);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.4);
      o.start(t); o.stop(t+0.4);
    });
  } catch(e){}
}

// ── Helpers ──────────────────────────────────────────────────────────────────
function shuffle(arr) {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function calcScore() {
  let pts = 0;
  PAIRS.forEach(p => {
    const errs = errorsPerPair[p.id] || 0;
    const pairPts = Math.max(0, BASE_PER_PAIR - errs * PENALTY);
    pts += pairPts;
  });
  return Math.round(pts * 10) / 10; // 1 decimal
}

function scoreLabel(n) {
  if (n >= 9)  return { emoji:'🏆', title:'INCRÍVEL!',     msg:'Você arrasou! Parabéns!',       bg:'#6BCB77', tc:'white' };
  if (n >= 7)  return { emoji:'🌟', title:'MUITO BEM!',    msg:'Você foi muito bem!',            bg:'#FFD93D', tc:'#2D2D2D' };
  if (n >= 5)  return { emoji:'😊', title:'BOM TRABALHO!', msg:'Continua praticando!',           bg:'#5BC8F5', tc:'white' };
  return            { emoji:'💪', title:'TENTE DE NOVO!', msg:'Cada tentativa é aprendizado!', bg:'#FF6B6B', tc:'white' };
}

// ── Build board ───────────────────────────────────────────────────────────────
function build() {
  selectedSymbol = null; matched = 0; totalErrors = 0; errorsPerPair = {};
  document.getElementById('connector-canvas').innerHTML = '';
  document.querySelectorAll('.star').forEach(s => s.classList.remove('earned'));

  const symCol = document.getElementById('col-symbols');
  const msgCol = document.getElementById('col-messages');
  symCol.innerHTML = ''; msgCol.innerHTML = '';

  shuffledMsgs = shuffle(PAIRS);

  PAIRS.forEach(pair => {
    errorsPerPair[pair.id] = 0;
    const sc = document.createElement('div');
    sc.className = 'card symbol-card';
    sc.dataset.id = pair.id;
    sc.tabIndex = 0;
    sc.style.background = pair.color;
    sc.style.borderColor = pair.border;
    sc.innerHTML = `<div class="emoji">${pair.symbol}</div><div class="lbl">${pair.lbl}</div><div class="checkmark">✓</div>`;
    sc.addEventListener('click', () => onSymbolClick(pair.id));
    sc.addEventListener('keydown', e => { if(e.key==='Enter'||e.key===' ') onSymbolClick(pair.id); });
    symCol.appendChild(sc);
  });

  shuffledMsgs.forEach(pair => {
    const mc = document.createElement('div');
    mc.className = 'card message-card';
    mc.dataset.id = pair.id;
    mc.tabIndex = 0;
    mc.innerHTML = `<div class="txt">${pair.message}</div><div class="checkmark">✓</div>`;
    mc.addEventListener('click', () => onMessageClick(pair.id));
    mc.addEventListener('keydown', e => { if(e.key==='Enter'||e.key===' ') onMessageClick(pair.id); });
    msgCol.appendChild(mc);
  });
}

// ── Interactions ──────────────────────────────────────────────────────────────
function onSymbolClick(id) {
  const card = document.querySelector(`.symbol-card[data-id="${id}"]`);
  if (!card || card.classList.contains('matched') || card.classList.contains('disabled')) return;
  document.querySelectorAll('.symbol-card.selected').forEach(c => c.classList.remove('selected'));
  if (selectedSymbol === id) { selectedSymbol = null; return; }
  selectedSymbol = id;
  card.classList.add('selected');
}

function onMessageClick(id) {
  const msgCard = document.querySelector(`.message-card[data-id="${id}"]`);
  if (!msgCard || msgCard.classList.contains('matched') || msgCard.classList.contains('disabled')) return;
  if (!selectedSymbol) return;
  const symCard = document.querySelector(`.symbol-card[data-id="${selectedSymbol}"]`);

  if (selectedSymbol === id) {
    // ✅ CORRECT
    playSuccess();
    symCard.classList.remove('selected');
    symCard.classList.add('matched','disabled');
    msgCard.classList.add('matched','disabled');
    drawLine(symCard, msgCard);
    matched++;
    earnStar(matched - 1);
    selectedSymbol = null;
    if (matched === PAIRS.length) {
      setTimeout(() => { showResult(); }, 650);
    }
  } else {
    // ❌ WRONG
    playError();
    errorsPerPair[selectedSymbol] = (errorsPerPair[selectedSymbol] || 0) + 1;
    totalErrors++;
    symCard.classList.add('wrong');
    msgCard.classList.add('wrong');
    setTimeout(() => {
      symCard.classList.remove('wrong','selected');
      msgCard.classList.remove('wrong');
      selectedSymbol = null;
    }, 480);
  }
}

// ── Result modal ──────────────────────────────────────────────────────────────
function showResult() {
  playFinish();
  spawnConfetti();

  const nota   = calcScore();
  const info   = scoreLabel(nota);
  const notaFmt = Number.isInteger(nota) ? nota.toString() : nota.toFixed(1);

  document.getElementById('celeb-emoji').textContent   = info.emoji;
  document.getElementById('celeb-title').textContent   = info.title;
  document.getElementById('score-number').textContent  = notaFmt;
  document.getElementById('score-msg').textContent     = info.msg;
  document.getElementById('score-detail').textContent  =
    `${PAIRS.length} acertos · ${totalErrors} erro${totalErrors !== 1 ? 's' : ''}`;

  const circle = document.getElementById('score-circle');
  circle.style.background = info.bg;
  circle.style.color      = info.tc;

  document.getElementById('celebration').classList.add('show');
}

// ── Drawing ───────────────────────────────────────────────────────────────────
function getCenter(el) {
  const r = el.getBoundingClientRect();
  return { x: r.left + r.width/2, y: r.top + r.height/2 };
}
function drawLine(fromEl, toEl) {
  const svg = document.getElementById('connector-canvas');
  svg.setAttribute('viewBox', `0 0 ${window.innerWidth} ${window.innerHeight}`);
  const f = getCenter(fromEl), t = getCenter(toEl);
  const cx1 = f.x + (t.x-f.x)*0.4, cy1 = f.y;
  const cx2 = f.x + (t.x-f.x)*0.6, cy2 = t.y;
  const path = document.createElementNS('http://www.w3.org/2000/svg','path');
  path.setAttribute('d', `M ${f.x} ${f.y} C ${cx1} ${cy1}, ${cx2} ${cy2}, ${t.x} ${t.y}`);
  path.classList.add('connector-line');
  svg.appendChild(path);
}

function earnStar(index) {
  const s = document.getElementById(`star-${index}`);
  if(s) setTimeout(() => s.classList.add('earned'), 80);
}

function spawnConfetti() {
  const cols = ['#FFD93D','#FF6B6B','#5BC8F5','#6BCB77','#B388FF','#FF8C94'];
  for(let i=0;i<55;i++){
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.left = Math.random()*100+'vw';
    el.style.top  = '-12px';
    el.style.background = cols[Math.floor(Math.random()*cols.length)];
    el.style.animationDelay = Math.random()*0.7+'s';
    el.style.animationDuration = (1.1+Math.random()*0.9)+'s';
    el.style.borderRadius = Math.random()>0.5?'50%':'2px';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2800);
  }
}

function restart() {
  document.getElementById('celebration').classList.remove('show');
  document.getElementById('connector-canvas').innerHTML = '';
  build();
}

window.addEventListener('resize', () => {
  document.getElementById('connector-canvas').innerHTML = '';
});

build();
</script>
</body>
</html>
